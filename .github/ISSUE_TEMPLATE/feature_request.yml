name: Feature request
description: Suggest a new feature or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for new commands, module ideas, configuration improvements, or quality-of-life changes.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do, and why is the current behavior not enough?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature as you would expect to use it on a server.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention any workarounds or similar plugins/features you have looked at.

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Teleportation
        - Homes or warps
        - Gameplay utilities
        - Inventory utilities
        - Staff tools
        - Configuration
        - Developer API
        - Other
    validations:
      required: true
